<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvoDraw Overlay</title>
  <link rel="stylesheet" href="/src/renderer/overlay.css" />
</head>
<body>
  <!-- Mode indicator pill -->
  <div id="mode-indicator" class="mode-indicator working">
    <span class="mode-dot"></span>
    <span class="mode-text">Working</span>
  </div>

  <!-- Fabric.js drawing canvas -->
  <canvas id="overlay-canvas"></canvas>

  <!-- Floating mini toolbar -->
  <div id="toolbar" class="toolbar hidden">
    <div class="toolbar-drag-handle" id="toolbar-drag">⋮⋮</div>

    <button class="tool-btn active" data-tool="pen" title="Pen (P)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="highlighter" title="Highlighter (H)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 11-6 6v3h9l3-3"/>
        <path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
        <path d="M22 21H7"/><path d="m5 11 9 9"/>
      </svg>
    </button>

    <div class="toolbar-separator"></div>

    <!-- Color picker -->
    <div class="color-picker-wrap">
      <button class="tool-btn color-btn" id="color-btn" title="Color">
        <span class="color-swatch" id="color-swatch"></span>
      </button>
      <div class="color-dropdown hidden" id="color-dropdown">
        <div class="color-presets">
          <button class="color-preset active" data-color="#e03131" style="background:#e03131"></button>
          <button class="color-preset" data-color="#1971c2" style="background:#1971c2"></button>
          <button class="color-preset" data-color="#2f9e44" style="background:#2f9e44"></button>
          <button class="color-preset" data-color="#f76707" style="background:#f76707"></button>
          <button class="color-preset" data-color="#f59f00" style="background:#f59f00"></button>
          <button class="color-preset" data-color="#ffffff" style="background:#ffffff; border: 1px solid #555"></button>
          <button class="color-preset" data-color="#000000" style="background:#000000"></button>
        </div>
        <input type="color" id="custom-color" value="#e03131" />
      </div>
    </div>

    <!-- Width selector -->
    <div class="width-picker-wrap">
      <button class="tool-btn" id="width-btn" title="Stroke Width">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.5"/>
          <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="3"/>
          <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="5"/>
        </svg>
      </button>
      <div class="width-dropdown hidden" id="width-dropdown">
        <button class="width-opt" data-width="2">Thin</button>
        <button class="width-opt active" data-width="4">Normal</button>
        <button class="width-opt" data-width="8">Thick</button>
        <button class="width-opt" data-width="12">Bold</button>
      </div>
    </div>

    <div class="toolbar-separator"></div>

    <button class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
      </svg>
    </button>

    <button class="tool-btn" id="clear-btn" title="Clear All">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
      </svg>
    </button>

    <div class="toolbar-separator"></div>

    <button class="tool-btn" id="settings-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>

    <button class="tool-btn exit-btn" id="exit-btn" title="Close Overlay">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    </button>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="settings-modal hidden">
    <div class="settings-content">
      <h3>Overlay Settings</h3>

      <div class="setting-row">
        <label>Toggle Hotkey</label>
        <div class="hotkey-capture">
          <input type="text" id="hotkey-input" readonly placeholder="Press a shortcut..." />
          <button id="hotkey-record-btn">Record</button>
        </div>
      </div>

      <div class="setting-row">
        <label>Default Color</label>
        <input type="color" id="settings-color" value="#e03131" />
      </div>

      <div class="setting-row">
        <label>Default Width</label>
        <select id="settings-width">
          <option value="2">Thin (2px)</option>
          <option value="4" selected>Normal (4px)</option>
          <option value="8">Thick (8px)</option>
          <option value="12">Bold (12px)</option>
        </select>
      </div>

      <div class="settings-actions">
        <button id="settings-save" class="btn-primary">Save</button>
        <button id="settings-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Connection status -->
  <div id="connection-status" class="connection-status">
    <span class="conn-dot"></span>
    <span class="conn-text">Not connected</span>
  </div>

  <script type="module" src="/src/renderer/overlay.js"></script>
</body>
</html>
