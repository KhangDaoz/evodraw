services:
  mongo:
    image: mongo:7
    container_name: evodraw-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: evodraw-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/evodraw
      - ALLOWED_ORIGINS=http://localhost:5173
      - TOKEN_SECRET=local-dev-secret
    depends_on:
      - mongo
    restart: unless-stopped
volumes:
  mongo_data:
